<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Персональная визитка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(15, 15, 35, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .name {
            font-size: 44px;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(-45deg, #0066ff, #0099ff, #6666ff, #0066ff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            animation: glow 3s ease-in-out infinite, shine 6s ease-in-out infinite;
            letter-spacing: 1px;
        }

        @keyframes glow {
            0%, 100% {
                filter: drop-shadow(0 0 10px rgba(0, 102, 255, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 20px rgba(102, 102, 255, 0.5));
            }
        }

        @keyframes shine {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .specialization {
            font-size: 18px;
            color: #FFD700;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.3), transparent);
            margin-bottom: 40px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .social-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid rgba(0, 212, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .social-icon:hover {
            transform: translateY(-5px) scale(1.1);
            background: rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.6);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .social-icon svg {
            width: 24px;
            height: 24px;
            fill: #00d4ff;
            transition: fill 0.3s ease;
        }

        .social-icon:hover svg {
            fill: #ffffff;
        }

        .cta-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00d4ff, #6600ff);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:active {
            transform: translateY(0);
        }

        /* Адаптивный дизайн */
        @media (max-width: 600px) {
            .card {
                padding: 40px 25px;
            }

            .name {
                font-size: 36px;
                margin-bottom: 12px;
            }

            .specialization {
                font-size: 14px;
                margin-bottom: 30px;
            }

            .social-links {
                gap: 15px;
                margin-bottom: 30px;
            }

            .social-icon {
                width: 45px;
                height: 45px;
            }

            .social-icon svg {
                width: 20px;
                height: 20px;
            }

            .cta-button {
                padding: 14px;
                font-size: 15px;
            }
        }

        /* Дополнительные эффекты */
        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
        }

        .tooltip {
            position: relative;
        }

        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 212, 255, 0.9);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .tooltip:hover::after {
            opacity: 1;
        }
    </style>
</head>
<body>

    <script>
        function openTelegram() {

        // Добавляем интерактивность при загрузке
        document.addEventListener('DOMContentLoaded', function() {
            // Небольшая задержка для красивой анимации
            const card = document.querySelector('.card');
            card.style.animation = 'slideIn 0.8s ease-out';
        });

        // Эффект при клике на кнопку
        const button = document.querySelector('.cta-button');
        button.addEventListener('click', function() {
            this.style.transform = 'scale(0.98)';
            setTimeout(() => {
                this.style.transform = '';
            }, 100);
        });
    </script>
